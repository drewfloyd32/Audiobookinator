<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eBook Audio Reader</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- JSZip for EPUB ZIP parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- PDF.js for PDF reading -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- Google Fonts: Inter & Lora -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet" />
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      .font-serif-reading {
        font-family: 'Lora', Georgia, serif;
      }
      /* Custom scrollbars */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #e4e0d5;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #d1ccc0;
      }
    </style>
  </head>
  <body class="bg-[#fdfbf7] text-[#2d2a26] min-h-screen flex flex-col antialiased">
    <div id="root" class="min-h-screen flex flex-col"></div>

    <!-- Load React, ReactDOM and Babel Standalone for live client-side compilation -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- App Code -->
    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      // Ensure PDF.js worker is set
      pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

      // 1. WAV Header utility for raw 16-bit Mono 24000Hz PCM
      function addWavHeader(base64Pcm, sampleRate = 24000) {
        const binaryString = atob(base64Pcm);
        const len = binaryString.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) {
          bytes[i] = binaryString.charCodeAt(i);
        }
        
        const numChannels = 1;
        const bitsPerSample = 16;
        const blockAlign = numChannels * (bitsPerSample / 8);
        const byteRate = sampleRate * blockAlign;
        const dataSize = bytes.length;
        const chunkSize = 36 + dataSize;
        
        const header = new ArrayBuffer(44);
        const view = new DataView(header);
        
        // "RIFF"
        view.setUint32(0, 0x52494646, false);
        // ChunkSize (LE)
        view.setUint32(4, chunkSize, true);
        // "WAVE"
        view.setUint32(8, 0x57415645, false);
        // "fmt "
        view.setUint32(12, 0x666d7420, false);
        // Subchunk1Size (16 for PCM)
        view.setUint32(16, 16, true);
        // AudioFormat (1 for PCM)
        view.setUint16(20, 1, true);
        // NumChannels
        view.setUint16(22, numChannels, true);
        // SampleRate
        view.setUint32(24, sampleRate, true);
        // ByteRate
        view.setUint32(28, byteRate, true);
        // BlockAlign
        view.setUint16(32, blockAlign, true);
        // BitsPerSample
        view.setUint16(34, bitsPerSample, true);
        // "data"
        view.setUint32(36, 0x64617461, false);
        // Subchunk2Size
        view.setUint32(40, dataSize, true);
        
        const wavBytes = new Uint8Array(44 + dataSize);
        wavBytes.set(new Uint8Array(header), 0);
        wavBytes.set(bytes, 44);
        
        const blob = new Blob([wavBytes], { type: 'audio/wav' });
        return URL.createObjectURL(blob);
      }

      // 2. Parser Functions
      async function parsePdf(fileBuffer, onProgress) {
        const loadingTask = pdfjsLib.getDocument({ data: fileBuffer });
        const pdf = await loadingTask.promise;
        const totalPages = pdf.numPages;
        const chapters = [];

        for (let i = 1; i <= totalPages; i++) {
          const page = await pdf.getPage(i);
          const textContent = await page.getTextContent();
          
          let lastY = -1;
          let pageText = "";
          
          for (const item of textContent.items) {
            if (item.str) {
              if (lastY !== -1 && Math.abs(item.transform[5] - lastY) > 5) {
                pageText += "\n";
              } else if (pageText && !pageText.endsWith("\n") && !pageText.endsWith(" ")) {
                pageText += " ";
              }
              pageText += item.str;
              lastY = item.transform[5];
            }
          }

          const trimmedText = pageText.trim();
          if (trimmedText.length > 0) {
            let title = `Page ${i}`;
            const firstLine = trimmedText.split("\n")[0].trim();
            if (firstLine && firstLine.length > 3 && firstLine.length < 50 && !firstLine.includes(".") && !/\d+/.test(firstLine)) {
              title = `Page ${i}: ${firstLine}`;
            }

            chapters.push({
              id: `page-${i}`,
              title,
              text: trimmedText,
            });
          }

          if (onProgress) onProgress(Math.round((i / totalPages) * 100));
        }
        return chapters;
      }

      async function parseEpub(fileBuffer, onProgress) {
        const zip = await JSZip.loadAsync(fileBuffer);
        const containerFile = zip.file("META-INF/container.xml");
        if (!containerFile) throw new Error("Invalid EPUB: missing container.xml");

        const containerXmlStr = await containerFile.async("string");
        const parser = new DOMParser();
        const containerDoc = parser.parseFromString(containerXmlStr, "text/xml");
        const rootfileEl = containerDoc.querySelector("rootfile");
        if (!rootfileEl) throw new Error("Invalid container.xml");

        const opfPath = rootfileEl.getAttribute("full-path");
        const baseDir = opfPath.includes("/") ? opfPath.substring(0, opfPath.lastIndexOf("/") + 1) : "";

        const opfFile = zip.file(opfPath);
        const opfXmlStr = await opfFile.async("string");
        const opfDoc = parser.parseFromString(opfXmlStr, "text/xml");

        const manifestItems = opfDoc.querySelectorAll("manifest > item");
        const manifestMap = new Map();
        manifestItems.forEach((item) => {
          const id = item.getAttribute("id");
          const href = item.getAttribute("href");
          if (id && href) manifestMap.set(id, decodeURIComponent(href));
        });

        const spineItems = opfDoc.querySelectorAll("spine > itemref");
        const chapters = [];
        const totalSpineItems = spineItems.length;

        for (let i = 0; i < totalSpineItems; i++) {
          const idref = spineItems[i].getAttribute("idref");
          if (!idref) continue;

          const href = manifestMap.get(idref);
          if (!href) continue;

          let fullPath = baseDir + href;
          if (fullPath.includes("../")) {
            const parts = fullPath.split("/");
            const stack = [];
            for (const part of parts) {
              if (part === "..") stack.pop();
              else if (part !== ".") stack.push(part);
            }
            fullPath = stack.join("/");
          }

          const file = zip.file(fullPath) || zip.file(fullPath.split("#")[0]);
          if (!file) continue;

          const htmlStr = await file.async("string");
          const chapterDoc = parser.parseFromString(htmlStr, "text/html");
          
          // Clean non-readable nodes
          chapterDoc.querySelectorAll("script, style, iframe, noscript").forEach(el => el.remove());

          let title = "";
          const heading = chapterDoc.querySelector("h1, h2, h3, h4");
          if (heading) title = heading.textContent.trim();
          if (!title && chapterDoc.title) title = chapterDoc.title.trim();
          if (!title || title.length > 80) title = `Section ${chapters.length + 1}`;

          const paragraphs = chapterDoc.querySelectorAll("p, div, li, h1, h2, h3, h4, blockquote");
          let bodyText = "";
          paragraphs.forEach((p) => {
            const pText = p.textContent ? p.textContent.trim() : "";
            if (pText.length > 0 && !bodyText.endsWith(pText)) {
              bodyText += pText + "\n\n";
            }
          });

          const cleanedText = bodyText.replace(/\r\n/g, "\n").replace(/\n{3,}/g, "\n\n").trim();
          if (cleanedText) {
            chapters.push({
              id: idref,
              title,
              text: cleanedText,
            });
          }

          if (onProgress) onProgress(Math.round(((i + 1) / totalSpineItems) * 100));
        }
        return chapters;
      }

      // App Component
      function App() {
        const [apiKey, setApiKey] = useState(() => localStorage.getItem("gemini_tts_api_key") || "");
        const [showKeyPrompt, setShowKeyPrompt] = useState(!localStorage.getItem("gemini_tts_api_key"));
        const [books, setBooks] = useState(() => {
          try {
            return JSON.parse(localStorage.getItem("tts_reader_books") || "[]");
          } catch {
            return [];
          }
        });
        const [currentBookIndex, setCurrentBookIndex] = useState(() => {
          const idx = parseInt(localStorage.getItem("tts_reader_curr_idx") || "-1", 10);
          return idx;
        });
        const [isLoading, setIsLoading] = useState(false);
        const [loadingProgress, setLoadingProgress] = useState(0);
        
        // Player State
        const [engine, setEngine] = useState("browser"); // "gemini" or "browser"
        const [isPlaying, setIsPlaying] = useState(false);
        const [playbackSpeed, setPlaybackSpeed] = useState(1);
        const [geminiVoice, setGeminiVoice] = useState("Kore");
        const [browserVoice, setBrowserVoice] = useState("");
        const [speechVoices, setSpeechVoices] = useState([]);
        const [fontSize, setFontSize] = useState("md"); // "sm", "md", "lg", "xl"

        // Playback tracking
        const [currentSentenceIndex, setCurrentSentenceIndex] = useState(-1);
        const [sentences, setSentences] = useState([]);

        const audioRef = useRef(new Audio());
        const synthesisUtteranceRef = useRef(null);
        const readerContentRef = useRef(null);

        const currentBook = currentBookIndex >= 0 && currentBookIndex < books.length ? books[currentBookIndex] : null;
        const currentChapter = currentBook ? currentBook.chapters[currentBook.currentChapterIndex] : null;

        // Load speech synthesis voices
        useEffect(() => {
          const updateVoices = () => {
            const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
            setSpeechVoices(voices);
            if (voices.length > 0 && !browserVoice) {
              const defaultVoice = voices.find(v => v.lang.startsWith("en")) || voices[0];
              setBrowserVoice(defaultVoice.name);
            }
          };
          updateVoices();
          if (window.speechSynthesis) {
            window.speechSynthesis.onvoiceschanged = updateVoices;
          }
        }, [browserVoice]);

        // Save state to localStorage
        useEffect(() => {
          localStorage.setItem("tts_reader_books", JSON.stringify(books));
          localStorage.setItem("tts_reader_curr_idx", currentBookIndex.toString());
        }, [books, currentBookIndex]);

        // Split text into sentences for readers when chapter changes
        useEffect(() => {
          if (currentChapter) {
            // regex to split by sentence delimiters but keeping them
            const text = currentChapter.text;
            const sentenceList = text
              .split(/(?<=[.!?])\s+/)
              .filter(s => s.trim().length > 0);
            setSentences(sentenceList);
            setCurrentSentenceIndex(-1);
            stopPlayback();
          } else {
            setSentences([]);
            setCurrentSentenceIndex(-1);
          }
        }, [currentBookIndex, currentBook?.currentChapterIndex]);

        const saveApiKey = (key) => {
          const trimmed = key.trim();
          setApiKey(trimmed);
          if (trimmed) {
            localStorage.setItem("gemini_tts_api_key", trimmed);
            setShowKeyPrompt(false);
          } else {
            localStorage.removeItem("gemini_tts_api_key");
          }
        };

        const handleFileUpload = async (e) => {
          const file = e.target.files[0];
          if (!file) return;

          setIsLoading(true);
          setLoadingProgress(10);
          try {
            const fileType = file.name.endsWith(".pdf") ? "pdf" : file.name.endsWith(".epub") ? "epub" : null;
            if (!fileType) throw new Error("Unsupported format. Please upload .pdf or .epub files.");

            const arrayBuffer = await file.arrayBuffer();
            let parsedChapters = [];

            if (fileType === "pdf") {
              parsedChapters = await parsePdf(arrayBuffer, (p) => setLoadingProgress(10 + Math.round(p * 0.9)));
            } else {
              parsedChapters = await parseEpub(arrayBuffer, (p) => setLoadingProgress(10 + Math.round(p * 0.9)));
            }

            const newBook = {
              id: Date.now().toString(),
              title: file.name.replace(/\.[^/.]+$/, ""), // remove extension
              fileName: file.name,
              fileType,
              chapters: parsedChapters,
              currentChapterIndex: 0
            };

            setBooks(prev => [newBook, ...prev]);
            setCurrentBookIndex(0);
          } catch (err) {
            alert(err.message || "Failed to process book file.");
          } finally {
            setIsLoading(false);
            setLoadingProgress(0);
          }
        };

        const deleteBook = (idx, e) => {
          e.stopPropagation();
          stopPlayback();
          setBooks(prev => prev.filter((_, i) => i !== idx));
          if (currentBookIndex === idx) {
            setCurrentBookIndex(-1);
          } else if (currentBookIndex > idx) {
            setCurrentBookIndex(prev => prev - 1);
          }
        };

        const changeChapter = (idx) => {
          if (!currentBook) return;
          stopPlayback();
          const updated = [...books];
          updated[currentBookIndex].currentChapterIndex = idx;
          setBooks(updated);
        };

        // Scroll highlighted sentence into view
        useEffect(() => {
          if (currentSentenceIndex !== -1 && readerContentRef.current) {
            const activeEl = readerContentRef.current.querySelector(".active-sentence");
            if (activeEl) {
              activeEl.scrollIntoView({ behavior: "smooth", block: "center" });
            }
          }
        }, [currentSentenceIndex]);

        // PLAYBACK ENGINES

        const stopPlayback = () => {
          setIsPlaying(false);
          audioRef.current.pause();
          audioRef.current.src = "";
          if (window.speechSynthesis) {
            window.speechSynthesis.cancel();
          }
        };

        const playPause = async () => {
          if (isPlaying) {
            setIsPlaying(false);
            if (engine === "browser") {
              window.speechSynthesis.pause();
            } else {
              audioRef.current.pause();
            }
            return;
          }

          if (sentences.length === 0) return;

          let startIdx = currentSentenceIndex === -1 ? 0 : currentSentenceIndex;
          setIsPlaying(true);
          playSentence(startIdx);
        };

        const playSentence = async (index) => {
          if (index >= sentences.length) {
            // Next chapter logic
            if (currentBook && currentBook.currentChapterIndex < currentBook.chapters.length - 1) {
              const updated = [...books];
              updated[currentBookIndex].currentChapterIndex += 1;
              setBooks(updated);
              // Small delay to let useEffect run and split sentences
              setTimeout(() => {
                setCurrentSentenceIndex(0);
                setIsPlaying(true);
                playSentence(0);
              }, 300);
            } else {
              stopPlayback();
              setCurrentSentenceIndex(-1);
            }
            return;
          }

          setCurrentSentenceIndex(index);
          const sentenceText = sentences[index];

          if (engine === "browser") {
            // Browser Web Speech TTS
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(sentenceText);
            
            if (browserVoice) {
              const selectedVoice = speechVoices.find(v => v.name === browserVoice);
              if (selectedVoice) utterance.voice = selectedVoice;
            }
            
            utterance.rate = playbackSpeed;
            
            utterance.onend = () => {
              if (isPlaying) playSentence(index + 1);
            };
            
            utterance.onerror = () => {
              // On error fallback
              if (isPlaying) playSentence(index + 1);
            };

            synthesisUtteranceRef.current = utterance;
            window.speechSynthesis.speak(utterance);

            // Chrome/iOS Safari hack for long sentences occasionally pausing
            const keepAliveInterval = setInterval(() => {
              if (window.speechSynthesis.speaking) {
                window.speechSynthesis.pause();
                window.speechSynthesis.resume();
              } else {
                clearInterval(keepAliveInterval);
              }
            }, 10000);

          } else {
            // Gemini Cloud TTS
            if (!apiKey) {
              setShowKeyPrompt(true);
              setIsPlaying(false);
              return;
            }

            try {
              // Generate via Direct REST API
              const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-tts-preview:generateContent?key=${apiKey}`;
              const response = await fetch(url, {
                method: "POST",
                headers: {
                  "Content-Type": "application/json"
                },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: sentenceText }] }],
                  config: {
                    responseModalities: ["AUDIO"],
                    speechConfig: {
                      voiceConfig: {
                        prebuiltVoiceConfig: { voiceName: geminiVoice }
                      }
                    }
                  }
                })
              });

              if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                throw new Error(errData.error?.message || "Failed API call. Check API key.");
              }

              const resJson = await response.json();
              const base64Audio = resJson.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
              if (!base64Audio) throw new Error("No audio returned from Gemini.");

              const wavUrl = addWavHeader(base64Audio, 24000);
              
              audioRef.current.pause();
              audioRef.current.src = wavUrl;
              audioRef.current.playbackRate = playbackSpeed;
              
              audioRef.current.onended = () => {
                URL.revokeObjectURL(wavUrl);
                playSentence(index + 1);
              };

              audioRef.current.onerror = () => {
                URL.revokeObjectURL(wavUrl);
                if (isPlaying) playSentence(index + 1);
              };

              await audioRef.current.play();
            } catch (err) {
              alert(`Gemini TTS Error: ${err.message}. Falling back to offline browser voice.`);
              setEngine("browser");
              // Try playing the same sentence using browser TTS
              setTimeout(() => playSentence(index), 500);
            }
          }
        };

        // Sync playback rate if user changes speed during playback
        useEffect(() => {
          if (audioRef.current) {
            audioRef.current.playbackRate = playbackSpeed;
          }
        }, [playbackSpeed]);

        // Cleanup audio on unmount
        useEffect(() => {
          return () => {
            audioRef.current.pause();
            window.speechSynthesis?.cancel();
          };
        }, []);

        const nextSentence = () => {
          if (currentSentenceIndex < sentences.length - 1) {
            playSentence(currentSentenceIndex + 1);
          }
        };

        const prevSentence = () => {
          if (currentSentenceIndex > 0) {
            playSentence(currentSentenceIndex - 1);
          }
        };

        // Compute Font class
        const getFontSizeClass = () => {
          if (fontSize === "sm") return "text-sm md:text-base leading-relaxed";
          if (fontSize === "lg") return "text-lg md:text-2xl leading-relaxed";
          if (fontSize === "xl") return "text-xl md:text-3xl leading-relaxed";
          return "text-base md:text-xl leading-relaxed";
        };

        return (
          <div class="flex-1 flex flex-col h-screen overflow-hidden">
            {/* Header */}
            <header class="h-14 bg-white border-b border-stone-200 px-4 flex items-center justify-between z-10">
              <div class="flex items-center space-x-2">
                <svg class="w-5 h-5 text-amber-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
                <h1 class="text-base font-bold text-stone-900 tracking-tight">eBook Audio Reader</h1>
              </div>

              <div class="flex items-center space-x-2">
                <button 
                  onClick={() => setShowKeyPrompt(true)}
                  class="flex items-center space-x-1 text-xs px-2.5 py-1.5 rounded-full border border-amber-200 bg-amber-50 text-amber-800 hover:bg-amber-100 transition-colors"
                >
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                  </svg>
                  <span class="hidden sm:inline font-medium">Gemini Key</span>
                </button>
              </div>
            </header>

            {/* Main content split */}
            <div class="flex-1 flex overflow-hidden">
              {/* Sidebar: Book Navigation */}
              <aside class="w-64 bg-stone-50 border-r border-stone-200 flex-col hidden md:flex">
                <div class="p-4 border-b border-stone-200">
                  <label class="flex flex-col items-center justify-center border-2 border-dashed border-stone-300 rounded-lg py-4 px-2 hover:bg-stone-100 cursor-pointer transition-all">
                    <svg class="w-8 h-8 text-stone-400 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                    <span class="text-xs font-semibold text-stone-600">Upload PDF / EPUB</span>
                    <input type="file" accept=".pdf,.epub" class="hidden" onChange={handleFileUpload} />
                  </label>
                </div>

                <div class="flex-1 overflow-y-auto p-2 space-y-4">
                  <div>
                    <h3 class="px-2 text-xxs font-bold text-stone-400 uppercase tracking-wider mb-2">My Books</h3>
                    {books.length === 0 ? (
                      <p class="text-xs text-stone-500 px-2 italic">No books uploaded yet.</p>
                    ) : (
                      <div class="space-y-1">
                        {books.map((book, idx) => (
                          <div 
                            key={book.id} 
                            onClick={() => { stopPlayback(); setCurrentBookIndex(idx); }}
                            class={`flex items-center justify-between p-2 rounded-lg cursor-pointer text-xs font-medium transition-colors ${idx === currentBookIndex ? "bg-amber-100 text-amber-900" : "hover:bg-stone-200 text-stone-700"}`}
                          >
                            <span class="truncate pr-2">{book.title}</span>
                            <button onClick={(e) => deleteBook(idx, e)} class="text-stone-400 hover:text-red-600">
                              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                              </svg>
                            </button>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                  {currentBook && (
                    <div>
                      <h3 class="px-2 text-xxs font-bold text-stone-400 uppercase tracking-wider mb-2">Chapters</h3>
                      <div class="space-y-1 max-h-64 overflow-y-auto pr-1">
                        {currentBook.chapters.map((chapter, idx) => (
                          <button
                            key={chapter.id}
                            onClick={() => changeChapter(idx)}
                            class={`w-full text-left p-2 rounded text-xs truncate transition-colors ${idx === currentBook.currentChapterIndex ? "bg-[#efece3] font-semibold text-stone-900 border-l-4 border-amber-700" : "hover:bg-stone-200 text-stone-600"}`}
                          >
                            {chapter.title}
                          </button>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </aside>

              {/* Central Reading Screen */}
              <main class="flex-1 flex flex-col bg-[#faf6ef] overflow-hidden relative">
                {/* Loader Overlay */}
                {isLoading && (
                  <div class="absolute inset-0 bg-stone-900/40 backdrop-blur-xs flex flex-col items-center justify-center z-50 text-white p-4">
                    <div class="bg-stone-900 rounded-2xl p-6 flex flex-col items-center max-w-sm w-full text-center border border-stone-800">
                      <svg class="animate-spin h-8 w-8 text-amber-500 mb-3" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                      </svg>
                      <h4 class="font-bold text-lg mb-1">Parsing eBook</h4>
                      <p class="text-xs text-stone-400 mb-4">Reading EPUB files or unzipping pages. This stays fully local on your device.</p>
                      <div class="w-full bg-stone-800 rounded-full h-2">
                        <div class="bg-amber-500 h-2 rounded-full transition-all duration-300" style={{ width: `${loadingProgress}%` }}></div>
                      </div>
                      <span class="text-xs text-amber-500 mt-2 font-semibold">{loadingProgress}%</span>
                    </div>
                  </div>
                )}

                {/* Content Reader Pane */}
                <div class="flex-1 overflow-y-auto px-6 md:px-12 py-8" ref={readerContentRef}>
                  {!currentBook ? (
                    <div class="h-full flex flex-col items-center justify-center max-w-md mx-auto text-center py-20">
                      <div class="bg-white p-6 rounded-full shadow-xs border border-stone-100 mb-4 text-amber-700">
                        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                        </svg>
                      </div>
                      <h2 class="text-xl font-bold text-stone-900 mb-2">Welcome to eBook Audio Reader</h2>
                      <p class="text-sm text-stone-500 mb-6">Upload a book in .epub or .pdf format to read with our beautiful paper view, and listen to ultra-realistic Gemini narrator voices.</p>
                      
                      {/* Mobile file input card */}
                      <label class="w-full bg-amber-700 hover:bg-amber-800 text-white font-medium py-3 px-6 rounded-xl cursor-pointer shadow-md shadow-amber-900/10 transition-colors flex items-center justify-center space-x-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                        </svg>
                        <span>Choose EPUB or PDF</span>
                        <input type="file" accept=".pdf,.epub" class="hidden" onChange={handleFileUpload} />
                      </label>
                    </div>
                  ) : (
                    <div class="max-w-2xl mx-auto">
                      {/* Chapter Title block */}
                      <div class="border-b border-stone-200 pb-4 mb-8">
                        <span class="text-xs uppercase tracking-widest text-amber-800 font-semibold mb-1 block">{currentBook.title}</span>
                        <h2 class="text-2xl md:text-3xl font-serif-reading font-bold text-stone-900">{currentChapter?.title}</h2>
                      </div>

                      {/* Displaying Text and Highlighting active sentence */}
                      <div class={`font-serif-reading ${getFontSizeClass()} text-stone-800 whitespace-pre-wrap select-text`}>
                        {sentences.map((sentence, index) => {
                          const isActive = index === currentSentenceIndex;
                          return (
                            <span
                              key={index}
                              onClick={() => { stopPlayback(); setCurrentSentenceIndex(index); }}
                              class={`cursor-pointer transition-all duration-200 rounded p-0.5 ${isActive ? "bg-amber-200 text-stone-950 border-b border-amber-400 font-semibold active-sentence" : "hover:bg-stone-200/50"}`}
                            >
                              {sentence}{" "}
                            </span>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>

                {/* Settings toolbar overlay (top-right of reader screen) */}
                {currentBook && (
                  <div class="absolute top-4 right-4 flex items-center space-x-2 bg-white/95 backdrop-blur-xs px-2.5 py-1.5 rounded-full border border-stone-200/80 shadow-md z-10">
                    <button 
                      onClick={() => setFontSize(prev => prev === "sm" ? "md" : prev === "md" ? "lg" : prev === "lg" ? "xl" : "sm")}
                      class="p-1 rounded-full text-stone-600 hover:bg-stone-100 hover:text-stone-900 transition-colors"
                      title="Adjust font size"
                    >
                      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                      </svg>
                    </button>
                    <span class="text-xxs font-bold text-stone-400 uppercase tracking-wider select-none px-1">Size: {fontSize.toUpperCase()}</span>
                  </div>
                )}
              </main>
            </div>

            {/* Sticky Audio Control Bar */}
            {currentBook && (
              <footer class="bg-white border-t border-stone-200 px-4 py-3 md:py-4 flex flex-col space-y-3 z-20">
                {/* Progress tracker */}
                <div class="flex items-center justify-between text-xs text-stone-500 font-mono">
                  <div class="flex items-center space-x-2">
                    <span class="font-bold text-amber-800 uppercase text-xxs tracking-wider">{engine === "gemini" ? "Gemini TTS" : "Offline TTS"}</span>
                    <span>•</span>
                    <span class="truncate max-w-[200px]">{currentChapter?.title}</span>
                  </div>
                  <div>
                    {sentences.length > 0 ? (
                      <span>Sentence {currentSentenceIndex + 1} of {sentences.length}</span>
                    ) : (
                      <span>Reading text...</span>
                    )}
                  </div>
                </div>

                <div class="flex flex-col md:flex-row items-center md:justify-between space-y-3 md:space-y-0">
                  {/* Speech Engines & Voice settings */}
                  <div class="flex flex-wrap items-center gap-2 w-full md:w-auto">
                    {/* Toggle Engines */}
                    <div class="flex bg-stone-100 p-1 rounded-lg border border-stone-200 text-xs font-semibold">
                      <button 
                        onClick={() => { stopPlayback(); setEngine("gemini"); }}
                        class={`px-3 py-1.5 rounded-md transition-colors ${engine === "gemini" ? "bg-white text-stone-900 shadow-xs" : "text-stone-500 hover:text-stone-800"}`}
                      >
                        Gemini TTS
                      </button>
                      <button 
                        onClick={() => { stopPlayback(); setEngine("browser"); }}
                        class={`px-3 py-1.5 rounded-md transition-colors ${engine === "browser" ? "bg-white text-stone-900 shadow-xs" : "text-stone-500 hover:text-stone-800"}`}
                      >
                        Offline (Free)
                      </button>
                    </div>

                    {/* Voice selector */}
                    {engine === "gemini" ? (
                      <select 
                        value={geminiVoice} 
                        onChange={(e) => { stopPlayback(); setGeminiVoice(e.target.value); }}
                        class="text-xs bg-stone-50 border border-stone-300 rounded-lg p-2 font-medium text-stone-700 outline-none focus:ring-1 focus:ring-amber-500"
                      >
                        <option value="Kore">Kore (Male - Standard)</option>
                        <option value="Puck">Puck (Male - Cheerful)</option>
                        <option value="Charon">Charon (Female - Warm)</option>
                        <option value="Fenrir">Fenrir (Male - Rich)</option>
                        <option value="Zephyr">Zephyr (Female - Bright)</option>
                      </select>
                    ) : (
                      <select 
                        value={browserVoice} 
                        onChange={(e) => { stopPlayback(); setBrowserVoice(e.target.value); }}
                        class="text-xs max-w-[200px] bg-stone-50 border border-stone-300 rounded-lg p-2 font-medium text-stone-700 outline-none focus:ring-1 focus:ring-amber-500 truncate"
                      >
                        {speechVoices.map((v) => (
                          <option key={v.name} value={v.name}>{v.name} ({v.lang})</option>
                        ))}
                      </select>
                    )}

                    {/* Speed Controls */}
                    <div class="flex items-center space-x-2 bg-stone-50 px-2 py-1 rounded-lg border border-stone-200">
                      <svg class="w-4 h-4 text-stone-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                      </svg>
                      <select
                        value={playbackSpeed}
                        onChange={(e) => setPlaybackSpeed(parseFloat(e.target.value))}
                        class="text-xs bg-transparent border-none text-stone-700 font-semibold outline-none focus:ring-0 cursor-pointer"
                      >
                        <option value="0.5">0.5x</option>
                        <option value="0.75">0.75x</option>
                        <option value="1.0">1.0x</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2.0">2.0x</option>
                      </select>
                    </div>
                  </div>

                  {/* Playback Controls */}
                  <div class="flex items-center space-x-4">
                    <button 
                      onClick={prevSentence} 
                      disabled={sentences.length === 0 || currentSentenceIndex <= 0}
                      class="p-2 rounded-full border border-stone-200 text-stone-600 hover:bg-stone-100 disabled:opacity-40 transition-colors"
                    >
                      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0019 16V8a1 1 0 00-1.6-.8l-5.334 4zM4.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0011 16V8a1 1 0 00-1.6-.8l-5.334 4z" />
                      </svg>
                    </button>

                    <button 
                      onClick={playPause}
                      class="p-3.5 bg-amber-700 hover:bg-amber-800 text-white rounded-full shadow-md shadow-amber-900/10 transition-colors"
                    >
                      {isPlaying ? (
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                          <path fill-rule="evenodd" d="M18 18V6H14V18H18ZM10 18V6H6V18H10Z" clip-rule="evenodd" />
                        </svg>
                      ) : (
                        <svg class="w-6 h-6 pl-0.5" fill="currentColor" viewBox="0 0 24 24">
                          <path fill-rule="evenodd" d="M2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10S2 17.523 2 12zm10 1a1 1 0 100-2 1 1 0 000 2zm-2 4a1 1 0 100-2 1 1 0 000 2zm6-4a1 1 0 11-2 0 1 1 0 012 0z" clip-rule="evenodd" class="hidden" />
                          <path d="M8 5v14l11-7z" />
                        </svg>
                      )}
                    </button>

                    <button 
                      onClick={nextSentence}
                      disabled={sentences.length === 0 || currentSentenceIndex >= sentences.length - 1}
                      class="p-2 rounded-full border border-stone-200 text-stone-600 hover:bg-stone-100 disabled:opacity-40 transition-colors"
                    >
                      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.934 12.8a1 1 0 000-1.6l-5.334-4A1 1 0 005 8v8a1 1 0 001.6.8l5.334-4zM19.934 12.8a1 1 0 000-1.6l-5.334-4A1 1 0 0013 8v8a1 1 0 001.6.8l5.334-4z" />
                      </svg>
                    </button>

                    <button 
                      onClick={stopPlayback}
                      class="p-2 rounded-full border border-stone-200 text-stone-600 hover:bg-stone-100 transition-colors"
                    >
                      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <path fill-rule="evenodd" d="M4 4h16v16H4z" />
                      </svg>
                    </button>
                  </div>
                </div>
              </footer>
            )}

            {/* Key configuration prompt modal */}
            {showKeyPrompt && (
              <div class="fixed inset-0 bg-stone-900/60 backdrop-blur-xs flex items-center justify-center p-4 z-50">
                <div class="bg-white rounded-2xl border border-stone-200 p-6 max-w-md w-full shadow-2xl">
                  <div class="flex items-start space-x-3 mb-4">
                    <div class="bg-amber-100 text-amber-800 p-2 rounded-full">
                      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                      </svg>
                    </div>
                    <div>
                      <h3 class="text-lg font-bold text-stone-900">Configure Gemini API Key</h3>
                      <p class="text-xs text-stone-500 mt-1">To use ultra-realistic voice narration, enter your Google Gemini API Key. It will be stored securely in your browser's private localStorage and sent directly to Google's API.</p>
                    </div>
                  </div>

                  <input 
                    type="password" 
                    placeholder="AIzaSy..." 
                    defaultValue={apiKey}
                    id="apiKeyInput"
                    class="w-full bg-stone-50 border border-stone-300 rounded-xl px-4 py-2.5 text-sm font-mono outline-none focus:ring-2 focus:ring-amber-500 mb-4"
                  />

                  <div class="flex space-x-2">
                    <button 
                      onClick={() => {
                        const val = document.getElementById("apiKeyInput").value;
                        saveApiKey(val);
                      }}
                      class="flex-1 bg-amber-700 hover:bg-amber-800 text-white py-2 px-4 rounded-xl text-sm font-semibold transition-colors"
                    >
                      Save Key
                    </button>
                    <button 
                      onClick={() => {
                        setShowKeyPrompt(false);
                        setEngine("browser");
                      }}
                      class="flex-1 bg-stone-100 hover:bg-stone-200 text-stone-700 py-2 px-4 rounded-xl text-sm font-semibold transition-colors border border-stone-300"
                    >
                      Use Offline TTS Only
                    </button>
                  </div>
                  <div class="mt-4 pt-3 border-t border-stone-100 text-[10px] text-stone-400 text-center">
                    Get a free API key at <a href="https://aistudio.google.com/" target="_blank" class="text-amber-700 underline font-medium">Google AI Studio</a>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      // Render App
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>

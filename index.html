<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Narrator — Personal Audiobook</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --surface2:  #21262d;
    --amber:     #f0a832;
    --amber-dim: #7a5418;
    --text:      #e6edf3;
    --text-muted:#8b949e;
    --danger:    #f85149;
    --radius:    14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 60px 0;
  }

  /* ── Header ── */
  header {
    width: 100%;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--surface2);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-mark {
    width: 36px; height: 36px;
    background: var(--amber);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-mark svg { width: 20px; height: 20px; fill: #0d1117; }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  h1 span { color: var(--amber); }

  /* ── Setup Panel ── */
  #setup {
    width: 100%;
    max-width: 600px;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: var(--radius);
    padding: 20px;
  }

  .card-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 12px;
  }

  .api-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  input[type="text"], input[type="password"], input[type="url"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--surface2);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 0.95rem;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--amber); }
  input::placeholder { color: var(--text-muted); }

  .hint {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-top: 8px;
    line-height: 1.5;
  }
  .hint a { color: var(--amber); text-decoration: none; }

  /* ── Divider ── */
  .or-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--text-muted);
    font-size: 0.8rem;
  }
  .or-divider::before, .or-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--surface2);
  }

  /* ── Upload Zone ── */
  .upload-zone {
    border: 2px dashed var(--surface2);
    border-radius: 10px;
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--amber);
    background: rgba(240,168,50,0.05);
  }
  .upload-zone input[type="file"] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer;
    width: 100%; height: 100%;
  }
  .upload-icon { font-size: 2rem; margin-bottom: 8px; }
  .upload-zone p { color: var(--text-muted); font-size: 0.9rem; }
  .upload-zone strong { color: var(--text); }

  /* ── Buttons ── */
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 20px;
    border-radius: 10px;
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--amber);
    color: #0d1117;
    width: 100%;
  }
  .btn-primary:hover { background: #f7bc5a; }
  .btn-primary:disabled { background: var(--amber-dim); color: #555; cursor: not-allowed; }

  .btn-ghost {
    background: var(--surface2);
    color: var(--text);
    font-size: 0.85rem;
    padding: 10px 14px;
  }
  .btn-ghost:hover { background: #2d333b; }

  /* ── Error ── */
  .error-box {
    background: rgba(248,81,73,0.1);
    border: 1px solid rgba(248,81,73,0.3);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--danger);
    font-size: 0.88rem;
    display: none;
  }

  /* ── Player ── */
  #player {
    display: none;
    width: 100%;
    max-width: 600px;
    padding: 20px;
    flex-direction: column;
    gap: 20px;
  }

  .book-meta {
    text-align: center;
    padding: 8px 0;
  }
  .book-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .book-subtitle {
    color: var(--text-muted);
    font-size: 0.85rem;
  }

  /* ── Waveform / Progress ── */
  .waveform-wrap {
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: var(--radius);
    padding: 20px;
  }
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 48px;
    margin-bottom: 14px;
    cursor: pointer;
  }
  .wave-bar {
    flex: 1;
    background: var(--surface2);
    border-radius: 2px;
    transition: background 0.2s, height 0.15s;
    min-height: 4px;
  }
  .wave-bar.played { background: var(--amber); }
  .wave-bar.active { background: var(--amber); animation: pulse 0.6s ease-in-out infinite alternate; }

  @keyframes pulse {
    from { transform: scaleY(0.7); }
    to   { transform: scaleY(1.3); }
  }

  .progress-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-top: 4px;
  }
  .ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    width: 44px; height: 44px;
    transition: color 0.18s, background 0.18s;
    flex-shrink: 0;
  }
  .ctrl-btn:hover { color: var(--text); background: var(--surface2); }
  .ctrl-btn svg { width: 22px; height: 22px; fill: currentColor; }

  .play-btn {
    width: 64px; height: 64px;
    background: var(--amber);
    color: #0d1117;
    border-radius: 50%;
  }
  .play-btn:hover { background: #f7bc5a; color: #0d1117; }
  .play-btn svg { width: 28px; height: 28px; }

  /* ── Speed & Voice ── */
  .settings-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .setting-chip {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .setting-chip label {
    display: block;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 6px;
  }
  .setting-chip select {
    width: 100%;
    background: none;
    border: none;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    outline: none;
    cursor: pointer;
    appearance: none;
  }

  /* ── Chapter Nav ── */
  .chunk-nav {
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: var(--radius);
    padding: 16px;
  }
  .chunk-nav-label {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 10px;
  }
  .chunk-list {
    max-height: 180px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .chunk-list::-webkit-scrollbar { width: 4px; }
  .chunk-list::-webkit-scrollbar-track { background: var(--bg); }
  .chunk-list::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

  .chunk-item {
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 0.82rem;
    color: var(--text-muted);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .chunk-item:hover { background: var(--surface2); color: var(--text); }
  .chunk-item.active { background: rgba(240,168,50,0.12); color: var(--amber); }
  .chunk-num {
    font-size: 0.7rem;
    color: var(--text-muted);
    min-width: 22px;
    font-variant-numeric: tabular-nums;
  }

  /* ── Loading ── */
  .loading-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(13,17,23,0.85);
    backdrop-filter: blur(4px);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--surface2);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text-muted); font-size: 0.9rem; }

  /* ── Status Bar ── */
  .status-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--surface2);
    padding: 10px 20px;
    font-size: 0.78rem;
    color: var(--text-muted);
    text-align: center;
    z-index: 50;
  }

  /* ── Reset ── */
  .reset-row {
    display: flex;
    justify-content: center;
  }

  @media (max-width: 400px) {
    .settings-row { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">
    <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 0 18A9 9 0 0 0 12 3zm0 2a7 7 0 1 1 0 14A7 7 0 0 1 12 5zm-1 3v5l4 2.5-.75 1.23L10 14V8h1z"/></svg>
  </div>
  <h1>Narr<span>a</span>tor</h1>
</header>

<!-- ── SETUP ── -->
<div id="setup">

  <!-- Upload -->
  <div class="card">
    <div class="card-label">Load a Book</div>

    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept=".pdf,.epub,.txt" onchange="handleFile(this.files[0])">
      <div class="upload-icon">📖</div>
      <p><strong>Tap to choose a file</strong></p>
      <p style="margin-top:4px">PDF, ePub, or plain text</p>
    </div>

    <div class="or-divider" style="margin: 16px 0;">or paste a URL</div>

    <input type="url" id="bookUrl" placeholder="https://www.gutenberg.org/files/1342/1342-0.txt">
    <p class="hint">
      Works with plain-text Project Gutenberg links (right-click a book → "Plain Text UTF-8" → copy link).
    </p>
    <div style="margin-top: 12px;">
      <button class="btn btn-primary" onclick="loadFromUrl()">Load from URL</button>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>

</div>

<!-- ── PLAYER ── -->
<div id="player">

  <div class="book-meta">
    <div class="book-title" id="bookTitle">Loading…</div>
    <div class="book-subtitle" id="bookSubtitle"></div>
  </div>

  <!-- Waveform -->
  <div class="waveform-wrap">
    <div class="waveform" id="waveform" onclick="seekByWave(event)"></div>
    <div class="progress-row">
      <span id="chunkProgress">Section 0 of 0</span>
      <span id="timeDisplay">—</span>
    </div>

    <!-- Controls -->
    <div class="controls" style="margin-top:18px">
      <button class="ctrl-btn" onclick="skipChunk(-1)" title="Previous section">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()">
        <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="skipChunk(1)" title="Next section">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14 5.65 3.64L8 18.14V9.86zM16 6h2v12h-2z"/></svg>
      </button>
    </div>
  </div>

  <!-- Settings -->
  <div class="settings-row">
    <div class="setting-chip">
      <label>Voice</label>
      <select id="voiceSelect" onchange="updateVoice()">
        <option value="">Loading voices…</option>
      </select>
    </div>
    <div class="setting-chip">
      <label>Playback Speed</label>
      <select id="speedSelect" onchange="updateSpeed()">
        <option value="0.75">0.75×</option>
        <option value="1" selected>1×</option>
        <option value="1.25">1.25×</option>
        <option value="1.5">1.5×</option>
        <option value="1.75">1.75×</option>
        <option value="2">2×</option>
      </select>
    </div>
  </div>

  <!-- Section List -->
  <div class="chunk-nav">
    <div class="chunk-nav-label">Sections</div>
    <div class="chunk-list" id="chunkList"></div>
  </div>

  <!-- Reset -->
  <div class="reset-row">
    <button class="btn btn-ghost" onclick="resetApp()" style="width:100%">← Load a different book</button>
  </div>

</div>

<!-- ── Loading Overlay ── -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Reading book…</div>
</div>

<!-- ── Status Bar ── -->
<div class="status-bar" id="statusBar">Ready — load a book to begin</div>

<script>
// ── pdfjsLib setup ──
if (typeof pdfjsLib !== 'undefined') {
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

// ── State ──
let chunks       = [];
let currentChunk = 0;
let isPlaying    = false;
let bookName     = 'Book';
let playbackRate = 1;
let selectedVoice= null;
let utterance    = null;
let waveInterval = null;

// ── Web Speech API: load voices ──
function loadVoices() {
  const sel = document.getElementById('voiceSelect');
  let voices = speechSynthesis.getVoices();
  if (!voices.length) return; // not ready yet

  // Prefer English voices, put them first
  const en = voices.filter(v => v.lang.startsWith('en'));
  const rest = voices.filter(v => !v.lang.startsWith('en'));
  voices = [...en, ...rest];

  sel.innerHTML = '';
  voices.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${v.name} (${v.lang})`;
    if (v.default) opt.selected = true;
    sel.appendChild(opt);
  });

  // Restore saved preference
  const saved = localStorage.getItem('narrator_voice');
  if (saved) {
    const match = voices.findIndex(v => v.name === saved);
    if (match >= 0) sel.value = match;
  }

  selectedVoice = voices[parseInt(sel.value) || 0];
}

// voices load async — fire on event and on load
speechSynthesis.addEventListener('voiceschanged', loadVoices);
window.addEventListener('load', () => {
  loadVoices();
  const savedBook = localStorage.getItem('narrator_book');
  if (savedBook) {
    try {
      const b = JSON.parse(savedBook);
      chunks   = b.chunks;
      bookName = b.name;
      currentChunk = parseInt(localStorage.getItem('narrator_position') || '0');
      buildPlayer();
    } catch(e) { localStorage.removeItem('narrator_book'); }
  }
});

function updateVoice() {
  const sel = document.getElementById('voiceSelect');
  const voices = speechSynthesis.getVoices();
  selectedVoice = voices[parseInt(sel.value)];
  if (selectedVoice) localStorage.setItem('narrator_voice', selectedVoice.name);
}

// ── Drag & Drop ──
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});

// ── File Handling ──
async function handleFile(file) {
  if (!file) return;
  showLoading('Reading file…');
  try {
    let text = '';
    const ext = file.name.split('.').pop().toLowerCase();
    bookName = file.name.replace(/\.[^.]+$/, '');

    if (ext === 'pdf') {
      text = await extractPDF(file);
    } else if (ext === 'epub') {
      text = await extractEpub(file);
    } else {
      text = await file.text();
    }

    processText(text);
  } catch(e) {
    showError('Could not read file: ' + e.message);
    hideLoading();
  }
}

async function extractPDF(file) {
  const ab = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
  let text = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(s => s.str).join(' ') + '\n';
  }
  return text;
}

async function extractEpub(file) {
  const ab = await file.arrayBuffer();
  const decoder = new TextDecoder('utf-8', { fatal: false });
  const raw = decoder.decode(ab);
  const chunks_raw = raw.match(/[\x20-\x7E\n\r\t]{40,}/g) || [];
  let text = chunks_raw
    .filter(s => !s.includes('<?xml') && !s.includes('<html') && !/^[A-Z0-9+/=]{40,}$/.test(s))
    .join('\n');
  text = text.replace(/<[^>]+>/g, ' ').replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
  return text;
}

async function loadFromUrl() {
  const url = document.getElementById('bookUrl').value.trim();
  if (!url) { showError('Please enter a URL.'); return; }

  showLoading('Fetching book…');
  try {
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxyUrl);
    if (!res.ok) throw new Error('Network error');
    const data = await res.json();
    let text = data.contents;

    if (text.trim().startsWith('<')) {
      const doc = new DOMParser().parseFromString(text, 'text/html');
      text = doc.body ? doc.body.innerText : text.replace(/<[^>]+>/g,' ');
    }

    bookName = url.split('/').pop().replace(/[-_]/g,' ').replace(/\.[^.]*$/,'') || 'Book';
    processText(text);
  } catch(e) {
    showError('Could not fetch URL. Try downloading the file and uploading it instead. (' + e.message + ')');
    hideLoading();
  }
}

// ── Text Processing ──
function processText(rawText) {
  showLoading('Processing text…');

  let text = rawText.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

  const startMatch = text.match(/\*{3}\s*START OF (THIS|THE) PROJECT GUTENBERG/i);
  const endMatch   = text.match(/\*{3}\s*END OF (THIS|THE) PROJECT GUTENBERG/i);
  if (startMatch) text = text.slice(startMatch.index + startMatch[0].length);
  if (endMatch)   text = text.slice(0, text.indexOf(endMatch[0]));

  text = text.replace(/\n{3,}/g, '\n\n').trim();

  // Split into ~800-char chunks (Web Speech works better with shorter segments)
  const TARGET = 800;
  const paragraphs = text.split(/\n\n+/);
  const result = [];
  let current = '';

  for (const para of paragraphs) {
    const p = para.trim();
    if (!p) continue;
    if ((current + '\n\n' + p).length > TARGET && current.length > 0) {
      result.push(current.trim());
      current = p;
    } else {
      current = current ? current + '\n\n' + p : p;
    }
  }
  if (current.trim()) result.push(current.trim());

  chunks = result.filter(c => c.length > 20);

  if (chunks.length === 0) {
    showError('No readable text found in this file.');
    hideLoading();
    return;
  }

  try {
    localStorage.setItem('narrator_book', JSON.stringify({ chunks, name: bookName }));
    localStorage.setItem('narrator_position', '0');
  } catch(e) {}

  currentChunk = 0;
  hideLoading();
  buildPlayer();
}

// ── Build Player ──
function buildPlayer() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('player').style.display = 'flex';
  document.getElementById('bookTitle').textContent = formatTitle(bookName);
  document.getElementById('bookSubtitle').textContent = `${chunks.length} sections`;
  buildWaveform();
  buildChunkList();
  updateChunkDisplay();
  setStatus('Ready — press play');
}

function formatTitle(s) {
  return s.replace(/\b\w/g, c => c.toUpperCase()).slice(0, 60);
}

// ── Waveform ──
function buildWaveform() {
  const wf = document.getElementById('waveform');
  wf.innerHTML = '';
  const BAR_COUNT = 48;
  for (let i = 0; i < BAR_COUNT; i++) {
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    const h = 10 + Math.sin(i * 0.7) * 14 + Math.random() * 18;
    bar.style.height = h + 'px';
    wf.appendChild(bar);
  }
  updateWaveform();
}

function updateWaveform() {
  const bars = document.querySelectorAll('.wave-bar');
  if (!bars.length) return;
  const total = chunks.length;
  const progress = total > 0 ? currentChunk / total : 0;
  const played = Math.floor(progress * bars.length);

  bars.forEach((bar, i) => {
    bar.classList.remove('played','active');
    if (i < played) bar.classList.add('played');
    else if (i === played && isPlaying) bar.classList.add('active');
  });
}

function seekByWave(e) {
  const wf = document.getElementById('waveform');
  const ratio = e.offsetX / wf.offsetWidth;
  jumpToChunk(Math.floor(ratio * chunks.length));
}

// ── Chunk List ──
function buildChunkList() {
  const list = document.getElementById('chunkList');
  list.innerHTML = '';
  chunks.forEach((chunk, i) => {
    const item = document.createElement('div');
    item.className = 'chunk-item' + (i === currentChunk ? ' active' : '');
    item.onclick = () => jumpToChunk(i);

    const num = document.createElement('span');
    num.className = 'chunk-num';
    num.textContent = String(i + 1).padStart(2,'0');

    const preview = document.createElement('span');
    preview.textContent = chunk.slice(0, 60).replace(/\n/g,' ') + (chunk.length > 60 ? '…' : '');

    item.appendChild(num);
    item.appendChild(preview);
    list.appendChild(item);
  });
}

function updateChunkDisplay() {
  document.querySelectorAll('.chunk-item').forEach((el, i) => {
    el.classList.toggle('active', i === currentChunk);
  });
  const active = document.querySelector('.chunk-item.active');
  if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  document.getElementById('chunkProgress').textContent = `Section ${currentChunk + 1} of ${chunks.length}`;
  updateWaveform();
  localStorage.setItem('narrator_position', currentChunk);
}

// ── Speech Synthesis ──
function speakChunk(idx) {
  if (idx >= chunks.length) {
    stopPlayback();
    setStatus('Finished — reached end of book');
    return;
  }

  speechSynthesis.cancel(); // clear queue

  currentChunk = idx;
  isPlaying = true;
  updateChunkDisplay();
  updatePlayBtn();
  setStatus(`Playing section ${idx + 1} of ${chunks.length}`);

  utterance = new SpeechSynthesisUtterance(chunks[idx]);

  // Apply voice
  const voices = speechSynthesis.getVoices();
  const sel = document.getElementById('voiceSelect');
  const v = voices[parseInt(sel.value)];
  if (v) utterance.voice = v;

  utterance.rate = playbackRate;
  utterance.pitch = 1;

  utterance.onend = () => {
    if (isPlaying) speakChunk(idx + 1);
  };

  utterance.onerror = (e) => {
    if (e.error === 'interrupted' || e.error === 'canceled') return;
    showError('Speech error: ' + e.error);
    isPlaying = false;
    updatePlayBtn();
  };

  // Kick off waveform animation
  clearInterval(waveInterval);
  waveInterval = setInterval(updateWaveform, 600);

  speechSynthesis.speak(utterance);

  // iOS Safari workaround: speechSynthesis can stall; resume every 10s
  keepAlive();
}

// iOS keepalive — Safari pauses synthesis after ~15s
let keepAliveTimer = null;
function keepAlive() {
  clearInterval(keepAliveTimer);
  keepAliveTimer = setInterval(() => {
    if (!isPlaying) { clearInterval(keepAliveTimer); return; }
    if (speechSynthesis.paused) speechSynthesis.resume();
  }, 10000);
}

function stopPlayback() {
  isPlaying = false;
  speechSynthesis.cancel();
  clearInterval(waveInterval);
  clearInterval(keepAliveTimer);
  updatePlayBtn();
  updateWaveform();
  document.getElementById('timeDisplay').textContent = '—';
  setStatus('Paused');
}

function togglePlay() {
  if (isPlaying) {
    stopPlayback();
  } else {
    speakChunk(currentChunk);
  }
}

function skipChunk(delta) {
  const was = isPlaying;
  stopPlayback();
  currentChunk = Math.max(0, Math.min(chunks.length - 1, currentChunk + delta));
  updateChunkDisplay();
  if (was) speakChunk(currentChunk);
}

function jumpToChunk(idx) {
  const was = isPlaying;
  stopPlayback();
  currentChunk = idx;
  updateChunkDisplay();
  if (was) speakChunk(currentChunk);
}

function updatePlayBtn() {
  const icon = document.getElementById('playIcon');
  icon.innerHTML = isPlaying
    ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

function updateSpeed() {
  playbackRate = parseFloat(document.getElementById('speedSelect').value);
  if (utterance) utterance.rate = playbackRate;
  // Restart current chunk at new speed if playing
  if (isPlaying) speakChunk(currentChunk);
}

// ── UI Helpers ──
function showLoading(msg) {
  document.getElementById('loadingText').textContent = msg;
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}
function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.style.display = 'block';
  setTimeout(() => box.style.display = 'none', 7000);
}
function setStatus(msg) {
  document.getElementById('statusBar').textContent = msg;
}

function resetApp() {
  stopPlayback();
  chunks = []; currentChunk = 0;
  localStorage.removeItem('narrator_book');
  localStorage.removeItem('narrator_position');
  document.getElementById('player').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
  document.getElementById('bookUrl').value = '';
  document.getElementById('fileInput').value = '';
  setStatus('Ready — load a book to begin');
}
</script>
</body>
</html>
